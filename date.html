<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendez-vous ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h1>📅 Fixe le rendez-vous</h1>

    <p>Activité : <b id="act"></b></p>

    <input type="date" id="date">
    <input type="time" id="time">

    <button class="primary" onclick="validate()">Valider ❤️</button>

    <p id="msg"></p>
</div>

<script>
const WEBHOOK_URL = "COLLE_ICI_TON_WEBHOOK_DISCORD"; 
// 👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆
// ⚠️ C’EST ICI QUE TU METS TON LIEN DISCORD

const activity = localStorage.getItem("activity");
document.getElementById("act").innerText = activity || "Non définie";

function validate(){
    const d = document.getElementById("date").value;
    const t = document.getElementById("time").value;

    if(!d || !t){
        document.getElementById("msg").innerText =
            "Choisis une date ET une heure 😌";
        return;
    }

    // 🔥 ENVOI DISCORD
    fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            content:
`💖 Nouveau rendez-vous !
🎯 Activité : ${activity}
📅 Date : ${d}
⏰ Heure : ${t}`
        })
    });

    document.body.innerHTML = `
        <div style="text-align:center;font-family:Arial">
            <h1>💖 Rendez-vous confirmé !</h1>
            <p>${activity}</p>
            <p>${d} à ${t}</p>
            <h2>Envoyé sur Discord ✔</h2>
        </div>
    `;
}
</script>

</body>
</html>
