<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendez-vous ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h1>📅 On fixe le rendez-vous</h1>

    <p>Activité : <b id="act"></b></p>

    <input type="date" id="date">
    <input type="time" id="time">

    <button class="primary" onclick="validate()">Valider ❤️</button>

    <p id="msg"></p>
</div>

<script>
document.getElementById("act").innerText =
    localStorage.getItem("activity") || "Non définie";

function validate(){
    const d = document.getElementById("date").value;
    const t = document.getElementById("time").value;
    const act = localStorage.getItem("activity");

    if(!d || !t){
        document.getElementById("msg").innerText =
            "Choisis une date ET une heure 😌";
        return;
    }

    document.body.innerHTML = `
        <div style="text-align:center;font-family:Arial">
            <h1>💖 Rendez-vous confirmé !</h1>
            <p>${act}</p>
            <p>${d} à ${t}</p>
            <h2>On a un plan 😎</h2>
        </div>
    `;
}
</script>

</body>
</html>
