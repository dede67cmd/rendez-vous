<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>

    <div id="message"></div>
</div>

<script>
const non = document.getElementById("non");
const card = document.querySelector(".card");
const oui = document.querySelector(".primary");
const message = document.getElementById("message");

let count = 0;

/* 📍 position initiale propre (SOUS OUI) */
function initPosition(){
    const cardRect = card.getBoundingClientRect();
    const nonRect = non.getBoundingClientRect();
    const ouiRect = oui.getBoundingClientRect();

    const x = (cardRect.width / 2) - (nonRect.width / 2);
    const y = oui.offsetTop + ouiRect.height + 25;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

/* 🚀 TP dans la carte */
function teleport(){
    const cardRect = card.getBoundingClientRect();
    const nonRect = non.getBoundingClientRect();

    const padding = 10;

    const maxX = cardRect.width - nonRect.width - padding;
    const maxY = cardRect.height - nonRect.height - padding;

    const x = padding + Math.random() * maxX;
    const y = padding + Math.random() * maxY;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

/* ⚡ clic NON */
non.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();

    count++;
    teleport();

    if(count === 10){
        message.innerText = "😔 Ok... je commence à être un peu triste là...";
    }

    if(count === 15){
        message.innerText = "💔 Je pensais avoir une chance...";
    }

    if(count === 20){
        message.innerText = "🥺 dernière chance ?";
    }
});

/* init propre */
window.addEventListener("load", initPosition);
window.addEventListener("resize", initPosition);
</script>

</body>
</html>
