<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");
const card = document.querySelector(".card");
const oui = document.querySelector(".primary");

/* 📍 POSITION INIT PROPRE */
function initPosition(){
    const cardRect = card.getBoundingClientRect();
    const ouiRect = oui.getBoundingClientRect();
    const nonRect = non.getBoundingClientRect();

    // centre horizontal de la carte
    const x = (cardRect.width / 2) - (nonRect.width / 2);

    // sous le bouton OUI (dans la carte)
    const y = oui.offsetTop + ouiRect.height + 20;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

/* 🚀 TP PARTOUT SUR L’ÉCRAN */
function teleport(){
    const b = non.getBoundingClientRect();

    const maxX = window.innerWidth - b.width;
    const maxY = window.innerHeight - b.height;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

/* ⚡ fuite instantanée */
non.addEventListener("pointerdown", (e) => {
    teleport();
    e.preventDefault();
});

/* init */
initPosition();

/* sécurité resize */
window.addEventListener("resize", initPosition);
</script>

</body>
</html>
