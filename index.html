<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
.card{
    position:relative;
    overflow:hidden;
}

#non{
    position:absolute;
    width: 70%;
    left: 50%;
    transform: translateX(-50%);
}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");
const card = document.getElementById("card");

function initPosition(){
    const cardRect = card.getBoundingClientRect();
    const oui = document.querySelector(".primary");
    const ouiRect = oui.getBoundingClientRect();

    // 📍 position sous le bouton OUI
    const x = (cardRect.width / 2) - (non.offsetWidth / 2);
    const y = oui.offsetTop + ouiRect.height + 20;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

function teleport(){
    const c = card.getBoundingClientRect();
    const b = non.getBoundingClientRect();

    const padding = 10;

    const maxX = c.width - b.width - padding;
    const maxY = c.height - b.height - padding;

    const x = padding + Math.random() * maxX;
    const y = padding + Math.random() * maxY;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

// 🚀 fuite instantanée
non.addEventListener("pointerdown", (e) => {
    teleport();
    e.preventDefault();
});

initPosition();

// 🔥 recalc si écran change (mobile rotation)
window.addEventListener("resize", initPosition);
</script>

</body>
</html>
