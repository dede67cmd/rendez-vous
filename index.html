<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");

let targetX = window.innerWidth / 2;
let targetY = window.innerHeight / 2;
let currentX = targetX;
let currentY = targetY;

non.style.position = "absolute";

function animate(){
    currentX += (targetX - currentX) * 0.12;
    currentY += (targetY - currentY) * 0.12;

    non.style.left = currentX + "px";
    non.style.top = currentY + "px";

    requestAnimationFrame(animate);
}

function teleport(){
    const rect = non.getBoundingClientRect();

    targetX = Math.random() * (window.innerWidth - rect.width);
    targetY = Math.random() * (window.innerHeight - rect.height);
}

non.addEventListener("mouseenter", teleport);
non.addEventListener("click", (e) => {
    e.preventDefault();
    teleport();
});
non.addEventListener("touchstart", (e) => {
    e.preventDefault();
    teleport();
});

animate();
</script>

</body>
</html>
