<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:30px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

#oui{
    background:#ff4d6d;
    color:white;
    margin-right:10px;
}

#oui:hover{
    transform:scale(1.1);
}

#non{
    position:fixed;
    background:#ddd;
}
</style>
</head>

<body>

<div class="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button id="oui" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");

let targetX = window.innerWidth / 2;
let targetY = window.innerHeight / 2;
let currentX = targetX;
let currentY = targetY;

non.style.left = currentX + "px";
non.style.top = currentY + "px";

document.addEventListener("mousemove", (e) => {
    const rect = non.getBoundingClientRect();

    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top + rect.height / 2);

    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < 150){
        targetX = Math.random() * (window.innerWidth - rect.width);
        targetY = Math.random() * (window.innerHeight - rect.height);
    }
});

function animate(){
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;

    non.style.left = currentX + "px";
    non.style.top = currentY + "px";

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
