<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
.card{position:relative;overflow:hidden;}
#non{position:absolute;}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");
const card = document.getElementById("card");

function teleport(){
    const c = card.getBoundingClientRect();
    const b = non.getBoundingClientRect();

    const x = Math.random() * (c.width - b.width);
    const y = Math.random() * (c.height - b.height);

    non.style.left = x + "px";
    non.style.top = y + "px";
}

non.addEventListener("pointerdown", (e) => {
    teleport();
    e.preventDefault();
});
</script>

</body>
</html>
