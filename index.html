<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
#non{
    position:absolute;
    transform: translateX(-50%);
}
</style>
</head>

<body>

<div class="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");
const oui = document.querySelector(".primary");

function initPosition(){
    const r = oui.getBoundingClientRect();

    // 📍 centré sous le bouton OUI
    non.style.left = (r.left + r.width/2) + "px";
    non.style.top = (r.bottom + 20) + "px";
}

function teleport(){
    const w = window.innerWidth;
    const h = window.innerHeight;

    const b = non.getBoundingClientRect();

    // 🚀 TP sur TOUT l'écran
    const x = Math.random() * (w - b.width) + b.width/2;
    const y = Math.random() * (h - b.height);

    non.style.left = x + "px";
    non.style.top = y + "px";
}

// ⚡ fuite instantanée
non.addEventListener("pointerdown", (e) => {
    teleport();
    e.preventDefault();
});

// init
initPosition();
window.addEventListener("resize", initPosition);
</script>

</body>
</html>
