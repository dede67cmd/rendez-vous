<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
.card{
    position:relative;
}

#non{
    position:absolute;
}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");
const card = document.getElementById("card");

function placeInitial(){
    const c = card.getBoundingClientRect();
    const b = non.getBoundingClientRect();

    // position propre SOUS le bouton Oui
    const x = (c.width / 2) - (b.width / 2);
    const y = 120; // <-- force sous le bouton Oui (stable)

    non.style.left = x + "px";
    non.style.top = y + "px";
}

function teleport(){
    const c = card.getBoundingClientRect();
    const b = non.getBoundingClientRect();

    const padding = 10;

    const maxX = c.width - b.width - padding;
    const maxY = c.height - b.height - padding;

    // 🚀 TP INSTANTANÉ
    const x = padding + Math.random() * maxX;
    const y = padding + Math.random() * maxY;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

// événements
non.addEventListener("mouseenter", teleport);
non.addEventListener("click", (e) => {
    e.preventDefault();
    teleport();
});
non.addEventListener("touchstart", (e) => {
    e.preventDefault();
    teleport();
});

placeInitial();
</script>

</body>
</html>
