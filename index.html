<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question importante ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:200px;
    overflow:hidden;
}

button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}

#non{
    position:absolute;
}
</style>
</head>

<body>

<h1>Veux-tu sortir avec moi ? ❤️</h1>

<button onclick="window.location.href='date.html'">
    Oui 🥰
</button>

<button id="non">
    Non 😢
</button>

<script>
const non = document.getElementById("non");

document.addEventListener("mousemove",(e)=>{

    const rect = non.getBoundingClientRect();

    const x = rect.left + rect.width/2;
    const y = rect.top + rect.height/2;

    const distance = Math.hypot(
        e.clientX - x,
        e.clientY - y
    );

    if(distance < 120){

        non.style.left =
            Math.random()*(window.innerWidth-100)+"px";

        non.style.top =
            Math.random()*(window.innerHeight-50)+"px";
    }
});
</script>

</body>
</html>
