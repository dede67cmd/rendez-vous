<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
#message{
    margin-top:15px;
    color:#444;
    font-size:14px;
}

#non{
    position:absolute;
}
</style>
</head>

<body>

<div class="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>

    <div id="message"></div>
</div>

<script>
const non = document.getElementById("non");
const card = document.querySelector(".card");
const message = document.getElementById("message");

let count = 0;

/* 📍 position initiale propre */
function init(){
    const c = card.getBoundingClientRect();
    const b = non.getBoundingClientRect();

    const x = (c.width / 2) - (b.width / 2);
    const y = 140;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

/* 🚀 téléportation dans la carte */
function teleport(){
    const c = card.getBoundingClientRect();
    const b = non.getBoundingClientRect();

    const padding = 10;

    const maxX = c.width - b.width - padding;
    const maxY = c.height - b.height - padding;

    const x = padding + Math.random() * maxX;
    const y = padding + Math.random() * maxY;

    non.style.left = x + "px";
    non.style.top = y + "px";
}

/* ⚡ clic sur NON */
non.addEventListener("pointerdown", (e) => {
    e.preventDefault();

    count++;
    teleport();

    if(count === 2){
        message.innerText = "😔 Ok... je commence à être un peu triste là...";
    }

    if(count === 3){
        message.innerText = "💔 Je pensais avoir une chance...";
    }

    if(count === 5){
        message.innerText = "🥺 dernière chance ?";
    }
});

init();

/* sécurité resize */
window.addEventListener("resize", init);
</script>

</body>
</html>
