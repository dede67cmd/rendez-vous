<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
.card{
    position:relative; /* IMPORTANT */
    overflow:hidden;
}
#non{
    position:absolute;
}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");
const card = document.getElementById("card");

let targetX = 0;
let targetY = 0;
let currentX = 0;
let currentY = 0;

function init(){
    const c = card.getBoundingClientRect();
    const b = non.getBoundingClientRect();

    // POSITION INIT LOGIQUE (dans la carte)
    currentX = (c.width / 2) - (b.width / 2);
    currentY = (c.height / 2) + 30;

    targetX = currentX;
    targetY = currentY;

    non.style.left = currentX + "px";
    non.style.top = currentY + "px";
}

function animate(){
    // ⚡ PLUS RAPIDE
    const speed = 0.25;

    currentX += (targetX - currentX) * speed;
    currentY += (targetY - currentY) * speed;

    non.style.left = currentX + "px";
    non.style.top = currentY + "px";

    requestAnimationFrame(animate);
}

function teleport(){
    const c = card.getBoundingClientRect();
    const b = non.getBoundingClientRect();

    const padding = 10;

    const maxX = c.width - b.width - padding;
    const maxY = c.height - b.height - padding;

    // IMPORTANT : coordonnées RELATIVES à la carte
    targetX = padding + Math.random() * maxX;
    targetY = padding + Math.random() * maxY;
}

// triggers
non.addEventListener("mouseenter", teleport);
non.addEventListener("click", (e) => {
    e.preventDefault();
    teleport();
});
non.addEventListener("touchstart", (e) => {
    e.preventDefault();
    teleport();
});

init();
animate();
window.addEventListener("resize", init);
</script>

</body>
</html>
