<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h1>Veux-tu sortir avec moi ? ❤️</h1>

    <button class="primary" onclick="location.href='activities.html'">
        Oui 😍
    </button>

    <button id="non">Non 😢</button>
</div>

<script>
const non = document.getElementById("non");
const card = document.querySelector(".card");

let targetX = 0;
let targetY = 0;
let currentX = 0;
let currentY = 0;

function initPosition(){
    const cardRect = card.getBoundingClientRect();
    const btnRect = non.getBoundingClientRect();

    // position de départ logique dans la carte
    currentX = cardRect.left + (cardRect.width / 2) - (btnRect.width / 2);
    currentY = cardRect.top + (cardRect.height / 2) + 40;

    targetX = currentX;
    targetY = currentY;

    non.style.position = "absolute";
    non.style.left = currentX + "px";
    non.style.top = currentY + "px";
}

// animation fluide
function animate(){
    currentX += (targetX - currentX) * 0.12;
    currentY += (targetY - currentY) * 0.12;

    non.style.left = currentX + "px";
    non.style.top = currentY + "px";

    requestAnimationFrame(animate);
}

// téléportation dans la carte uniquement
function teleport(){
    const cardRect = card.getBoundingClientRect();
    const btnRect = non.getBoundingClientRect();

    const padding = 10;

    const minX = cardRect.left + padding;
    const maxX = cardRect.right - btnRect.width - padding;

    const minY = cardRect.top + padding;
    const maxY = cardRect.bottom - btnRect.height - padding;

    targetX = Math.random() * (maxX - minX) + minX;
    targetY = Math.random() * (maxY - minY) + minY;
}

// interactions
non.addEventListener("mouseenter", teleport);

non.addEventListener("click", (e) => {
    e.preventDefault();
    teleport();
});

non.addEventListener("touchstart", (e) => {
    e.preventDefault();
    teleport();
});

// init
initPosition();
animate();

// sécurité resize
window.addEventListener("resize", initPosition);
</script>

</body>
</html>
